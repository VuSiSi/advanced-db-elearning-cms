{% extends "base.html" %}
{% block title %}Analytics — E-Learning CMS{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Course Analytics</h1>
</div>

<div id="stats-container">
  <div class="loading">Loading stats...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const params   = new URLSearchParams(window.location.search);
const courseId = params.get('course_id');

async function loadStats() {
  if (getCurrentUserRole() !== 'instructor') {
    window.location.replace(courseId ? getDefaultCourseUrl(courseId) : '/courses');
    return;
  }

  const container = document.getElementById('stats-container');
  try {
    const res  = await fetch(`/api/stats/course/${courseId}`, { headers: authHeaders() });
    if (!res.ok) throw new Error('Failed to load stats');
    const data = await res.json();

    container.innerHTML = `
      <h2 style="margin-bottom:20px">${data.course_title}</h2>

      <!-- Summary cards -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px">
        ${statCard('Total Students',   data.total_students)}
        ${statCard('Avg Progress',     data.avg_progress_pct + '%')}
        ${statCard('Completion Rate',  data.completion_rate  + '%')}
        ${statCard('Avg Quiz Score',   data.avg_quiz_score ?? 'N/A')}
      </div>

      <!-- Per-lesson breakdown -->
      <h3 style="margin-bottom:12px">Per-lesson Breakdown</h3>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="border-bottom:1px solid var(--border)">
            <th style="text-align:left;padding:8px">Lesson ID</th>
            <th style="text-align:right;padding:8px">Completions</th>
            <th style="text-align:right;padding:8px">Avg Score</th>
          </tr>
        </thead>
        <tbody>
          ${data.per_lesson_stats.map(l => `
            <tr style="border-bottom:0.5px solid var(--border)">
              <td style="padding:8px;font-family:monospace">${l.lesson_id}</td>
              <td style="padding:8px;text-align:right">${l.completion_count}</td>
              <td style="padding:8px;text-align:right">
                ${l.avg_score !== null ? l.avg_score + '%' : '—'}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    `;
  } catch (err) {
    container.innerHTML = `<p class="error-state">${err.message}</p>`;
  }
}

function statCard(label, value) {
  return `
    <div style="border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">${label}</div>
      <div style="font-size:22px;font-weight:600">${value}</div>
    </div>`;
}

loadStats();
</script>
{% endblock %}
