{% extends "base.html" %}
{% block title %}Course Editor — E-Learning CMS{% endblock %}

{% block content %}
<div class="editor-layout">

  <!-- ── LEFT: Course tree sidebar ─────────────────── -->
  <aside class="editor-sidebar">
    <div class="sidebar-header">
      <h2 class="sidebar-title" id="course-title">Loading...</h2>
      <button class="btn btn-sm" id="btn-add-chapter" onclick="addChapter()">
        + Chapter
      </button>
    </div>

    <div class="tree-container" id="course-tree">
      <!-- Populated by JS -->
      <div class="loading">Loading structure...</div>
    </div>
  </aside>

  <!-- ── RIGHT: Lesson content panel ───────────────── -->
  <section class="editor-content">
    <div id="content-panel">
      <div class="empty-state">
        <p>Select a lesson from the left to view or edit its content.</p>
      </div>
    </div>
  </section>

</div>
{% endblock %}

{% block scripts %}
<script>
// ── Mock data for Day 1 (replaced with real API on Day 2) ──
const MOCK_COURSE = {
  id: 'mock-001',
  title: 'Introduction to Python',
  chapters: [
    {
      chapter_id: 'ch-1',
      title: 'Getting Started',
      order: 1,
      lessons: [
        { lesson_id: 'ls-1', title: 'What is Python?', type: 'video', order: 1 },
        { lesson_id: 'ls-2', title: 'Chapter 1 Quiz',  type: 'quiz',  order: 2 },
      ]
    },
    {
      chapter_id: 'ch-2',
      title: 'Variables & Types',
      order: 2,
      lessons: [
        { lesson_id: 'ls-3', title: 'Variables', type: 'document', order: 1 },
        { lesson_id: 'ls-4', title: 'Data Types', type: 'video',   order: 2 },
      ]
    }
  ]
};

const LESSON_TYPE_ICON = { video: '▶', quiz: '?', document: '≡' };

function renderTree(course) {
  document.getElementById('course-title').textContent = course.title;
  const tree = document.getElementById('course-tree');

  tree.innerHTML = course.chapters.map(ch => `
    <div class="tree-chapter" id="ch-${ch.chapter_id}">
      <div class="tree-chapter-header">
        <span class="tree-chevron">▾</span>
        <span class="tree-chapter-title">${ch.title}</span>
      </div>
      <div class="tree-lessons">
        ${ch.lessons.map(ls => `
          <div class="tree-lesson" onclick="selectLesson('${ls.lesson_id}', '${ls.type}', '${ls.title}')">
            <span class="lesson-icon">${LESSON_TYPE_ICON[ls.type] || '•'}</span>
            <span class="lesson-title">${ls.title}</span>
          </div>
        `).join('')}
        <div class="tree-add-lesson" onclick="addLesson('${ch.chapter_id}')">
          + Add lesson
        </div>
      </div>
    </div>
  `).join('');
}

function selectLesson(lessonId, type, title) {
  // Remove active state from all lessons
  document.querySelectorAll('.tree-lesson').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');

  // Render content panel based on lesson type
  const panel = document.getElementById('content-panel');
  if (type === 'video') {
    panel.innerHTML = `
      <div class="content-header"><h3>${title}</h3><span class="badge badge-video">Video</span></div>
      <div class="form-group"><label>Video URL</label><input type="text" placeholder="https://..." /></div>
      <div class="form-group"><label>Duration (seconds)</label><input type="number" placeholder="300" /></div>
      <button class="btn btn-primary">Save</button>
    `;
  } else if (type === 'quiz') {
    panel.innerHTML = `
      <div class="content-header"><h3>${title}</h3><span class="badge badge-quiz">Quiz</span></div>
      <p class="muted">Quiz editor — Day 4 (Quyen)</p>
    `;
  } else {
    panel.innerHTML = `
      <div class="content-header"><h3>${title}</h3><span class="badge badge-doc">Document</span></div>
      <div class="form-group"><label>Content</label><textarea rows="12" placeholder="Write content here..."></textarea></div>
      <button class="btn btn-primary">Save</button>
    `;
  }
}

function addChapter() {
  const name = prompt('Chapter title:');
  if (!name) return;
  alert('TODO Day 2: POST /api/courses/:id/chapters — ' + name);
}

function addLesson(chapterId) {
  const name = prompt('Lesson title:');
  if (!name) return;
  alert('TODO Day 2: POST /api/courses/:id/chapters/:ch/lessons — ' + name);
}

const courseId = "{{ course_id }}";  // Jinja2 inject from pages.py

async function loadCourse() {
  try {
    const res = await fetch(`/api/courses/${courseId}`, {
      headers: authHeaders()  // helper available in app.js
    });
    if (!res.ok) throw new Error("Failed to load course");
    const course = await res.json();
    renderTree(course);
  } catch (err) {
    document.getElementById('course-tree').innerHTML =
      `<p class="error-state">${err.message}</p>`;
  }
}

// Wire up real API for addChapter
async function addChapter() {
  const title = prompt('Chapter title:');
  if (!title) return;
  const res = await fetch(`/api/courses/${courseId}/chapters`, {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ title, order: 0 })
  });
  if (res.ok) loadCourse();  // re-render tree after adding
}

// Wire up real API for addLesson
async function addLesson(chapterId) {
  const title = prompt('Lesson title:');
  if (!title) return;
  const type  = prompt('Type (video / quiz / document):');
  if (!['video','quiz','document'].includes(type)) {
    alert('Invalid type'); return;
  }
  // Send minimal required fields per type
  const body = { title, order: 0, type,
    ...(type === 'video'    && { video_url: 'https://placeholder.com', duration_seconds: 0 }),
    ...(type === 'document' && { content: '# New lesson' }),
    ...(type === 'quiz'     && { questions: [] }),
  };
  const res = await fetch(`/api/courses/${courseId}/chapters/${chapterId}/lessons`, {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify(body)
  });
  if (res.ok) loadCourse();
}

loadCourse();  // kick off on page load — replaces renderTree(MOCK_COURSE)
