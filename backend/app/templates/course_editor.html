{% extends "base.html" %}
{% block title %}Course Editor — E-Learning CMS{% endblock %}

{% block content %}
<div class="editor-layout">

  <!-- ── LEFT: Course tree sidebar ─────────────────── -->
  <aside class="editor-sidebar">
    <div class="sidebar-header">
      <h2 class="sidebar-title" id="course-title">Loading...</h2>
      <button class="btn btn-sm" id="btn-add-chapter" onclick="addChapter()">
        + Chapter
      </button>
    </div>

    <div class="tree-container" id="course-tree">
      <!-- Populated by JS -->
      <div class="loading">Loading structure...</div>
    </div>
  </aside>

  <!-- ── RIGHT: Lesson content panel ───────────────── -->
  <section class="editor-content">
    <div id="content-panel">
      <div class="empty-state">
        <p>Select a lesson from the left to view or edit its content.</p>
      </div>
    </div>
  </section>

</div>

<!-- New-course creation overlay (shown when no courseId exists) -->
<div id="new-course-overlay" style="display:none; position:fixed; inset:0;
     background:rgba(0,0,0,0.45); z-index:200; display:flex;
     align-items:center; justify-content:center;">
  <div style="background:var(--bg); border-radius:var(--radius-lg);
              padding:28px; width:100%; max-width:420px;
              border:0.5px solid var(--border);">
    <h2 style="font-size:17px; font-weight:600; margin-bottom:20px;">
      Create New Course
    </h2>
    <div id="new-course-error" class="alert alert-error hidden"></div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="new-title" placeholder="e.g. Introduction to Python" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="new-desc" rows="3" placeholder="Short description..."></textarea>
    </div>
    <button class="btn btn-primary btn-full" onclick="createCourse()">
      Create Course
    </button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const LESSON_TYPE_ICON = { video: '▶', quiz: '?', document: '≡' };

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function renderTree(course) {
  document.getElementById('course-title').textContent = course.title;
  const tree = document.getElementById('course-tree');

  tree.innerHTML = course.chapters.map(ch => `
    <div class="tree-chapter" id="ch-${ch.chapter_id}">
      <div class="tree-chapter-header">
        <span class="tree-chevron">▾</span>
        <span class="tree-chapter-title">${esc(ch.title)}</span>
      </div>
      <div class="tree-lessons">
        ${ch.lessons.map(ls => `
          <div class="tree-lesson"
              data-lesson-id="${esc(ls.lesson_id)}"
              data-chapter-id="${esc(ch.chapter_id)}"
              data-lesson-type="${esc(ls.type)}"
              data-lesson-title="${esc(ls.title)}"
              draggable="true">
            <!-- BUG 1 FIXED: draggable (was draggle) -->
            <!-- BUG 3 FIXED: onclick replaced with data-* attributes, listener added below -->
            <span class="lesson-icon">${LESSON_TYPE_ICON[ls.type] || '•'}</span>
            <span>${esc(ls.title)}</span>
          </div>
        `).join('')}
        <div class="tree-add-lesson"
             data-chapter-id="${esc(ch.chapter_id)}"
             onclick="addLesson(this.dataset.chapterId)">
          + Add lesson
        </div>
      </div>
    </div>
  `).join('');

  tree.querySelectorAll('.tree-lesson').forEach(el => {
    el.addEventListener('click', () => {
      selectLesson(
        el.dataset.lessonId,
        el.dataset.chapterId,
        el.dataset.lessonType,
        el.dataset.lessonTitle   // safe: read from DOM property, not re-parsed as JS
      );
    });
  });
}

function enableDragDrop(course) {
  let dragSrcId = null;
  let dragSrcChapter = null;

  document.querySelectorAll('.tree-lesson').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragSrcId      = el.dataset.lessonId;
      dragSrcChapter = el.dataset.chapterId;
      el.style.opacity = '0.4';
    });

    el.addEventListener('dragend', e => {
      el.style.opacity = '1';
    });

    el.addEventListener('dragover', e => {
      e.preventDefault();
    });

    el.addEventListener('drop', async e => {
      e.preventDefault();
      const dropId      = el.dataset.lessonId;
      const dropChapter = el.dataset.chapterId;

      if (dragSrcChapter !== dropChapter) return;

      const updatedChapters = course.chapters.map(ch => {
        if (ch.chapter_id !== dragSrcChapter) return ch;
        const lessons = [...ch.lessons];
        const srcIdx  = lessons.findIndex(l => l.lesson_id === dragSrcId);
        const dstIdx  = lessons.findIndex(l => l.lesson_id === dropId);
        [lessons[srcIdx], lessons[dstIdx]] = [lessons[dstIdx], lessons[srcIdx]];
        return { ...ch, lessons };
      });

      await fetch(`/api/courses/${courseId}/reorder`, {
        method: 'PUT',
        headers: authHeaders(),
        body: JSON.stringify({ chapters: updatedChapters })
      });

      loadCourse();
    });
  });
}

function selectLesson(lessonId, chapterId, type, title) {
  const panel = document.getElementById('content-panel');

  if (type === 'video') {
    panel.innerHTML = `
      <div class="content-header">
        <h3>${esc(title)}</h3>
        <span class="badge badge-video">Video</span>
      </div>
      <input type="hidden" id="lesson-title" value="${esc(title)}" />
      <div class="form-group">
        <label>Video URL</label>
        <input type="text" id="video-url" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label>Duration (seconds)</label>
        <input type="number" id="duration" placeholder="300" />
      </div>
      <button class="btn btn-primary"
        data-lesson-id="${esc(lessonId)}"
        data-chapter-id="${esc(chapterId)}"
        data-lesson-type="video"
        onclick="saveLesson(this.dataset.lessonId, this.dataset.chapterId, this.dataset.lessonType)">
        Save
      </button>
      <span id="save-status" style="font-size:13px;margin-left:12px"></span>
    `;

  } else if (type === 'document') {
    panel.innerHTML = `
      <div class="content-header">
        <h3>${esc(title)}</h3>
        <span class="badge badge-doc">Document</span>
      </div>
      <input type="hidden" id="lesson-title" value="${esc(title)}" />
      <div class="form-group">
        <label>Content</label>
        <textarea id="content" rows="12" placeholder="Write content here..."></textarea>
      </div>
      <button class="btn btn-primary"
        data-lesson-id="${esc(lessonId)}"
        data-chapter-id="${esc(chapterId)}"
        data-lesson-type="document"
        onclick="saveLesson(this.dataset.lessonId, this.dataset.chapterId, this.dataset.lessonType)">
        Save
      </button>
      <span id="save-status" style="font-size:13px;margin-left:12px"></span>
    `;

  } else if (type === 'quiz') {
    panel.innerHTML = `
      <div class="content-header">
        <h3>${esc(title)}</h3>
        <span class="badge badge-quiz">Quiz</span>
      </div>
      <p class="muted">Quiz editor — Day 4</p>
    `;
  }
}

const courseId = "{{ course_id }}";

async function loadCourse() {
  // If there is no courseId, we are on /courses/new — show the creation overlay
  if (!courseId) {
    document.getElementById('course-title').textContent = 'New Course';
    document.getElementById('course-tree').innerHTML = '';
    document.getElementById('btn-add-chapter').style.display = 'none';
    document.getElementById('new-course-overlay').style.display = 'flex';
    return;
  }

  document.getElementById('course-tree').innerHTML =
    `<div class="loading">Loading structure...</div>`;
  try {
    const res = await fetch(`/api/courses/${courseId}`, {
      headers: authHeaders()
    });
    if (!res.ok) throw new Error('Failed to load course');
    const course = await res.json();
    renderTree(course);
    enableDragDrop(course);
  } catch (err) {
    document.getElementById('course-tree').innerHTML =
      `<p class="error-state">${err.message}</p>`;
  }
}

async function createCourse() {
  const title = document.getElementById('new-title').value.trim();
  const description = document.getElementById('new-desc').value.trim();
  const errBox = document.getElementById('new-course-error');
  errBox.classList.add('hidden');

  if (!title) {
    errBox.textContent = 'Title is required.';
    errBox.classList.remove('hidden');
    return;
  }

  try {
    const res = await fetch('/api/courses/', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ title, description })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Failed to create course');
    // Redirect to the real editor with the new course ID
    window.location.href = `/courses/${data.id}`;
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.remove('hidden');
  }
}

async function addChapter() {
  const title = prompt('Chapter title:');
  if (!title) return;
  const res = await fetch(`/api/courses/${courseId}/chapters`, {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ title, order: 0 })
  });
  if (res.ok) loadCourse();
}

async function addLesson(chapterId) {
  const title = prompt('Lesson title:');
  if (!title) return;
  const type  = prompt('Type (video / quiz / document):');
  if (!['video', 'quiz', 'document'].includes(type)) {
    alert('Invalid type'); return;
  }
  const body = {
    title, order: 0, type,
    ...(type === 'video'    && { video_url: 'https://placeholder.com', duration_seconds: 0 }),
    ...(type === 'document' && { content: '# New lesson' }),
    ...(type === 'quiz'     && { questions: [] }),
  };
  const res = await fetch(`/api/courses/${courseId}/chapters/${chapterId}/lessons`, {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify(body)
  });
  if (res.ok) loadCourse();
}

async function saveLesson(lessonId, chapterId, type) {
  const statusEl = document.getElementById('save-status');
  statusEl.textContent = 'Saving...';

  const title = document.getElementById('lesson-title')?.value || 'Untitled';

  let body = { title, order: 0, type };
  if (type === 'video') {
    body.video_url        = document.getElementById('video-url').value;
    body.duration_seconds = parseInt(document.getElementById('duration').value) || 0;
  } else if (type === 'document') {
    body.content = document.getElementById('content').value;
  }

  const res = await fetch(
    `/api/courses/${courseId}/chapters/${chapterId}/lessons/${lessonId}`,
    { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) }
  );

  if (res.ok) {
    statusEl.style.color = 'var(--teal-600)';
    statusEl.textContent = 'Saved!';
    setTimeout(() => statusEl.textContent = '', 2000);
    loadCourse();
  } else {
    statusEl.style.color = '#A32D2D';
    statusEl.textContent = 'Save failed.';
  }
}

loadCourse();
</script>
{% endblock %}
