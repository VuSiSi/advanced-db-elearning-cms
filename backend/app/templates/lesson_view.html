{% extends "base.html" %}
{% block title %}Lesson — E-Learning CMS{% endblock %}

{% block content %}
<div id="lesson-container">
  <div class="loading">Loading lesson...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Read course_id and lesson_id from URL params
const params   = new URLSearchParams(window.location.search);
const courseId = params.get('course_id');
const lessonId = params.get('lesson_id');

async function loadLesson() {
  const container = document.getElementById('lesson-container');
  try {
    const res    = await fetch(`/api/courses/${courseId}`, { headers: authHeaders() });
    const course = await res.json();

    // Find the lesson inside nested chapters
    let lesson = null;
    for (const ch of course.chapters) {
      lesson = ch.lessons.find(l => l.lesson_id === lessonId);
      if (lesson) break;
    }
    if (!lesson) { container.innerHTML = '<p class="error-state">Lesson not found.</p>'; return; }

    // Render based on type
    if (lesson.type === 'video') {
      container.innerHTML = `
        <h2>${lesson.title}</h2>
        <video controls style="width:100%;border-radius:8px;margin:16px 0">
          <source src="${lesson.video_url}" />
        </video>
        <button class="btn btn-primary" onclick="markComplete()">Mark as complete</button>`;

    } else if (lesson.type === 'document') {
      container.innerHTML = `
        <h2>${lesson.title}</h2>
        <div class="doc-content" style="line-height:1.8;max-width:720px">
          ${lesson.content}
        </div>
        <button class="btn btn-primary" onclick="markComplete()" style="margin-top:24px">
          Mark as complete
        </button>`;

    } else if (lesson.type === 'quiz') {
      // Build quiz form — static HTML, submit handled in JS
      const questions = lesson.questions || [];
      const qHtml = questions.map((q, i) => `
        <div style="margin-bottom:20px">
          <p><strong>Q${i+1}. ${q.question}</strong></p>
          ${q.options.map((opt, j) => `
            <label style="display:block;margin:4px 0;cursor:pointer">
              <input type="radio" name="q${i}" value="${j}" /> ${opt}
            </label>`).join('')}
        </div>`).join('');

      container.innerHTML = `
        <h2>${lesson.title}</h2>
        <div id="quiz-form">${qHtml}</div>
        <button class="btn btn-primary" onclick="submitQuiz(${JSON.stringify(questions)})">
          Submit quiz
        </button>
        <div id="quiz-result" style="margin-top:16px"></div>`;
    }
  } catch (err) {
    container.innerHTML = `<p class="error-state">${err.message}</p>`;
  }
}

async function markComplete() {
  const token   = localStorage.getItem('token');
  const payload = JSON.parse(atob(token.split('.')[1]));
  await fetch(`/api/progress/complete?student_id=${payload.sub}&course_id=${courseId}&lesson_id=${lessonId}`, {
    method: 'POST', headers: authHeaders()
  });
  alert('Lesson marked as complete!');
}

function submitQuiz(questions) {
  let correct = 0;
  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (selected && parseInt(selected.value) === q.correct_index) correct++;
  });
  const score = Math.round((correct / questions.length) * 100);
  document.getElementById('quiz-result').innerHTML =
    `<p class="alert alert-success">Score: ${score}% (${correct}/${questions.length})</p>`;

  // Auto mark complete with score
  const token   = localStorage.getItem('token');
  const payload = JSON.parse(atob(token.split('.')[1]));
  fetch(`/api/progress/complete?student_id=${payload.sub}&course_id=${courseId}&lesson_id=${lessonId}&score=${score}`, {
    method: 'POST', headers: authHeaders()
  });
}

loadLesson();
</script>
{% endblock %}
