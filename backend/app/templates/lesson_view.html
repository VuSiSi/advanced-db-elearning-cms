{% extends "base.html" %}
{% block title %}Lesson - E-Learning CMS{% endblock %}

{% block content %}
<div class="lesson-shell">
  <div class="lesson-topbar">
    <a class="lesson-back" id="lesson-back-link" href="/courses">Back to course</a>
    <span class="lesson-view-badge">Student lesson</span>
  </div>

  <div id="lesson-progress-slot"></div>

  <div id="lesson-container">
    <div class="loading">Loading lesson...</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<style>
.lesson-shell {
  display: grid;
  gap: 18px;
}

.lesson-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.lesson-back {
  color: var(--purple-600);
  font-size: 13px;
  font-weight: 700;
  text-decoration: none;
}

.lesson-back:hover {
  text-decoration: underline;
}

.lesson-view-badge {
  padding: 6px 10px;
  border-radius: 999px;
  border: 0.5px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
}

.lesson-progress-card,
.lesson-card {
  border-radius: 18px;
  border: 0.5px solid var(--border);
  background: var(--bg);
}

.lesson-progress-card {
  padding: 16px 18px;
}

.lesson-card {
  padding: 24px;
}

.lesson-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.lesson-title {
  margin: 0;
  font-size: clamp(24px, 3vw, 34px);
  line-height: 1.15;
}

.lesson-type {
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(124, 92, 191, 0.10);
  color: var(--purple-600);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.lesson-content {
  line-height: 1.8;
}

.lesson-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 24px;
}

.lesson-muted {
  font-size: 13px;
  color: var(--text-muted);
}

.lesson-progress-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text-secondary);
}

.lesson-progress-bar {
  height: 8px;
  overflow: hidden;
  border-radius: 999px;
  background: var(--bg-secondary);
}

.lesson-progress-fill {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--teal-600), var(--purple-600));
  transition: width 0.35s ease;
}

.lesson-quiz-question {
  margin-bottom: 20px;
  padding: 18px;
  border-radius: 14px;
  background: var(--bg-secondary);
}

.lesson-quiz-question p {
  margin-top: 0;
}

.lesson-quiz-option {
  display: block;
  margin: 6px 0;
  cursor: pointer;
}

@media (max-width: 720px) {
  .lesson-card {
    padding: 20px 16px;
  }
}
</style>

<script>
const params = new URLSearchParams(window.location.search);
const courseId = params.get('course_id');
const lessonId = params.get('lesson_id');
let activeQuizQuestions = [];

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function lessonTypeLabel(type) {
  return {
    video: 'Video',
    document: 'Document',
    quiz: 'Quiz',
  }[type] || 'Lesson';
}

function renderLessonCard(lesson, bodyHtml, actionsHtml = '') {
  const container = document.getElementById('lesson-container');
  container.innerHTML = `
    <div class="lesson-card">
      <div class="lesson-header">
        <div>
          <h1 class="lesson-title">${escapeHtml(lesson.title)}</h1>
        </div>
        <span class="lesson-type">${lessonTypeLabel(lesson.type)}</span>
      </div>
      <div class="lesson-content">${bodyHtml}</div>
      ${actionsHtml ? `<div class="lesson-actions">${actionsHtml}</div>` : ''}
    </div>
  `;
}

async function loadLesson() {
  const role = getCurrentUserRole();

  if (!courseId || !lessonId) {
    window.location.replace('/courses');
    return;
  }

  if (role === 'instructor') {
    window.location.replace(getInstructorCourseUrl(courseId));
    return;
  }

  if (role !== 'student') {
    window.location.replace('/courses');
    return;
  }

  document.getElementById('lesson-back-link').href = getStudentCourseUrl(courseId);

  try {
    const res = await fetch(`/api/courses/${courseId}`, { headers: authHeaders() });
    if (!res.ok) throw new Error('Failed to load lesson');

    const course = await res.json();
    let lesson = null;
    for (const chapter of course.chapters || []) {
      lesson = (chapter.lessons || []).find((item) => item.lesson_id === lessonId);
      if (lesson) break;
    }

    if (!lesson) {
      document.getElementById('lesson-container').innerHTML = '<p class="error-state">Lesson not found.</p>';
      return;
    }

    if (lesson.type === 'video') {
      renderLessonCard(
        lesson,
        `
          <video controls style="width:100%;border-radius:14px;margin:8px 0 0">
            <source src="${escapeHtml(lesson.video_url || '')}" />
          </video>
        `,
        `
          <button class="btn btn-primary" onclick="markComplete()">Mark as complete</button>
          <span class="lesson-muted">Finish watching, then save your progress.</span>
        `
      );
      return;
    }

    if (lesson.type === 'document') {
      renderLessonCard(
        lesson,
        `<div class="doc-content">${lesson.content || ''}</div>`,
        `
          <button class="btn btn-primary" onclick="markComplete()">Mark as complete</button>
          <span class="lesson-muted">Use this after you finish reading the lesson.</span>
        `
      );
      return;
    }

    activeQuizQuestions = lesson.questions || [];
    const questionsHtml = activeQuizQuestions.map((question, questionIndex) => `
      <div class="lesson-quiz-question">
        <p><strong>Q${questionIndex + 1}. ${escapeHtml(question.question)}</strong></p>
        ${(question.options || []).map((option, optionIndex) => `
          <label class="lesson-quiz-option">
            <input type="radio" name="q${questionIndex}" value="${optionIndex}" />
            ${escapeHtml(option)}
          </label>
        `).join('')}
      </div>
    `).join('');

    renderLessonCard(
      lesson,
      `<div id="quiz-form">${questionsHtml}</div><div id="quiz-result" style="margin-top:16px"></div>`,
      `
        <button class="btn btn-primary" id="quiz-submit-btn" onclick="submitQuiz()" ${activeQuizQuestions.length ? '' : 'disabled'}>
          Submit quiz
        </button>
        <span class="lesson-muted">${activeQuizQuestions.length ? 'Your score is saved when you submit.' : 'This quiz does not have any questions yet.'}</span>
      `
    );
  } catch (err) {
    document.getElementById('lesson-container').innerHTML = `<p class="error-state">${escapeHtml(err.message)}</p>`;
  }
}

async function markComplete() {
  const studentId = getCurrentUserId();
  if (!studentId) return;

  const res = await fetch(
    `/api/progress/complete?student_id=${studentId}&course_id=${courseId}&lesson_id=${lessonId}`,
    {
      method: 'POST',
      headers: authHeaders(),
    }
  );

  if (!res.ok) {
    alert('Failed to save progress. Please try again.');
    return;
  }

  await loadProgressBar(courseId);
  alert('Lesson marked as complete!');
}

function submitQuiz() {
  if (!activeQuizQuestions.length) {
    document.getElementById('quiz-result').innerHTML = `
      <div class="alert alert-error">This quiz does not have any questions yet.</div>
    `;
    return;
  }

  let correct = 0;
  const results = activeQuizQuestions.map((question, questionIndex) => {
    const selected = document.querySelector(`input[name="q${questionIndex}"]:checked`);
    const isCorrect = selected && parseInt(selected.value, 10) === question.correct_index;
    if (isCorrect) correct++;
    return { question: question.question, isCorrect };
  });

  const total = activeQuizQuestions.length || 1;
  const score = Math.round((correct / total) * 100);
  const resultHtml = results.map((item) => `
    <p style="color:${item.isCorrect ? 'var(--teal-600)' : '#A32D2D'}">
      ${item.isCorrect ? 'Correct' : 'Incorrect'}: ${escapeHtml(item.question)}
    </p>
  `).join('');

  document.getElementById('quiz-result').innerHTML = `
    <div class="alert ${score >= 60 ? 'alert-success' : 'alert-error'}">
      Score: ${score}% (${correct}/${activeQuizQuestions.length})
    </div>
    ${resultHtml}
  `;

  document.getElementById('quiz-submit-btn').disabled = true;
  markCompleteWithScore(score);
}

async function markCompleteWithScore(score) {
  const studentId = getCurrentUserId();
  if (!studentId) return;

  try {
    const res = await fetch(
      `/api/progress/complete?student_id=${studentId}&course_id=${courseId}&lesson_id=${lessonId}&score=${encodeURIComponent(score)}`,
      {
        method: 'POST',
        headers: authHeaders(),
      }
    );

    if (!res.ok) throw new Error('Failed to save quiz progress');
    await loadProgressBar(courseId);
  } catch (err) {
    console.error('Error marking quiz complete:', err);
  }
}

async function loadProgressBar(currentCourseId) {
  const studentId = getCurrentUserId();
  if (!studentId || getCurrentUserRole() !== 'student') return;

  const res = await fetch(
    `/api/progress/${studentId}/${currentCourseId}`,
    { headers: authHeaders() }
  );
  if (!res.ok) return;

  const data = await res.json();
  const pct = Math.round(data.overall_progress_pct || 0);
  document.getElementById('lesson-progress-slot').innerHTML = `
    <div class="lesson-progress-card">
      <div class="lesson-progress-row">
        <span>Course progress</span>
        <strong>${pct}%</strong>
      </div>
      <div class="lesson-progress-bar">
        <div class="lesson-progress-fill" style="width:${pct}%"></div>
      </div>
    </div>
  `;
}

loadLesson();
loadProgressBar(courseId);
</script>
{% endblock %}
