{% extends "base.html" %}
{% block title %}Login — E-Learning CMS{% endblock %}

{% block content %}
<div class="auth-wrapper">

  <!-- ── Tab switcher ─────────────────────────────── -->
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login form -->
    <div id="form-login">
      <h2 class="auth-title">Welcome back</h2>
      <div id="login-error" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary btn-full" onclick="handleLogin()">Sign in</button>
    </div>

    <!-- Register form -->
    <div id="form-register" class="hidden">
      <h2 class="auth-title">Create account</h2>
      <div id="register-error" class="alert alert-error hidden"></div>
      <div id="register-success" class="alert alert-success hidden"></div>

      <div class="form-group">
        <label for="reg-name">Full name</label>
        <input type="text" id="reg-name" placeholder="Jane Doe" />
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label for="reg-role">I am a...</label>
        <select id="reg-role">
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
        </select>
      </div>
      <button class="btn btn-primary btn-full" onclick="handleRegister()">Create account</button>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function switchTab(tab) {
  document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

async function handleLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errBox   = document.getElementById('login-error');
  errBox.classList.add('hidden');

  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, full_name: '', role: 'student' }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');

    localStorage.setItem('token', data.access_token);
    window.location.href = '/courses';
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.remove('hidden');
  }
}

async function handleRegister() {
  const full_name = document.getElementById('reg-name').value.trim();
  const email     = document.getElementById('reg-email').value.trim();
  const password  = document.getElementById('reg-password').value;
  const role      = document.getElementById('reg-role').value;
  const errBox    = document.getElementById('register-error');
  const okBox     = document.getElementById('register-success');
  errBox.classList.add('hidden');
  okBox.classList.add('hidden');

  try {
    const res  = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, full_name, role }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Registration failed');

    okBox.textContent = 'Account created! Please log in.';
    okBox.classList.remove('hidden');
    setTimeout(() => switchTab('login'), 1500);
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.remove('hidden');
  }
}
</script>
{% endblock %}
