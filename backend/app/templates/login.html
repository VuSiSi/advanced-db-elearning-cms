{% extends "base.html" %}
{% block title %}Login — E-Learning CMS{% endblock %}

{% block content %}
<div class="auth-wrapper">

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <div id="form-login">
      <h2 class="auth-title">Welcome back</h2>
      <div id="login-error" class="alert alert-error hidden"></div>

      <div class="form-group">
        <input type="email" id="login-email" placeholder="Email Address" />
      </div>
      <div class="form-group">
        <div style="position: relative;">
          <input type="password" id="login-password" placeholder="Password" style="padding-right: 40px;" />
          <button type="button" onclick="togglePassword('login-password', this)" tabindex="-1"
                  style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); 
                         background: none; border: none; cursor: pointer; color: var(--text-muted); 
                         display: flex; align-items: center; justify-content: center; padding: 4px;">
            <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="handleLogin()">Sign in</button>
    </div>

    <div id="form-register" class="hidden">
      <h2 class="auth-title">Create account</h2>
      <div id="register-error" class="alert alert-error hidden"></div>
      
      <div id="register-success" class="alert alert-success hidden" style="white-space: pre-line; line-height: 1.5;"></div>

      <div class="form-group">
        <input type="text" id="reg-name" placeholder="Full Name" />
      </div>
      <div class="form-group">
        <input type="email" id="reg-email" placeholder="Email Address" />
      </div>

      <div class="form-group">
        <div style="position: relative;">
          <input type="password" id="reg-password" placeholder="Password" style="padding-right: 40px;" />
          <button type="button" onclick="togglePassword('reg-password', this)" tabindex="-1"
                  style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); 
                         background: none; border: none; cursor: pointer; color: var(--text-muted); 
                         display: flex; align-items: center; justify-content: center; padding: 4px;">
            <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <div style="position: relative;">
          <input type="password" id="reg-password-confirm" placeholder="Confirm Password" style="padding-right: 40px;" />
          <button type="button" onclick="togglePassword('reg-password-confirm', this)" tabindex="-1"
                  style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); 
                         background: none; border: none; cursor: pointer; color: var(--text-muted); 
                         display: flex; align-items: center; justify-content: center; padding: 4px;">
            <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group" style="margin-top: 18px;">
        <label>Choose Role</label>
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 8px;">
          <label id="role-card-student" 
                 style="border: 1.5px solid var(--border); border-radius: 10px; padding: 15px 10px; 
                        cursor: pointer; display: flex; flex-direction: column; align-items: center; 
                        gap: 8px; transition: all 0.15s; user-select: none;">
            <input type="radio" name="reg-role" value="student" style="display: none;" onchange="highlightRoleCard('student')" />
            <span style="font-size: 24px;">🎓</span>
            <span style="font-size: 12px; font-weight: 600;">Student</span>
          </label>

          <label id="role-card-instructor" 
                 style="border: 1.5px solid var(--border); border-radius: 10px; padding: 15px 10px; 
                        cursor: pointer; display: flex; flex-direction: column; align-items: center; 
                        gap: 8px; transition: all 0.15s; user-select: none;">
            <input type="radio" name="reg-role" value="instructor" style="display: none;" onchange="highlightRoleCard('instructor')" />
            <span style="font-size: 24px;">👨‍🏫</span>
            <span style="font-size: 12px; font-weight: 600;">Instructor</span>
          </label>
        </div>
      </div>

      <button class="btn btn-primary btn-full" style="margin-top: 20px;" onclick="handleRegister()">Create account</button>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>

// Function to toggle password visibility
function togglePassword(inputId, btnElement) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btnElement.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      </svg>`; // Scalable Vector Graphics of a closed eye
  } else {
    input.type = 'password';
    btnElement.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>`; // Scalable Vector Graphics of an open eye
  }
}

// Function to highlight selected role card
function highlightRoleCard(selected) {
  ['student', 'instructor'].forEach(r => {
    const card = document.getElementById(`role-card-${r}`);
    if (!card) return;
    const isSelected = r === selected;
    card.style.borderColor = isSelected ? 'var(--purple-600)' : 'var(--border)';
    card.style.background  = isSelected ? 'var(--purple-50)'  : 'transparent';
    card.style.color       = isSelected ? 'var(--purple-800)' : 'inherit';
  });
}

// Function to switch between login and register tabs
function switchTab(tab) {
  document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

// Function to handle login
async function handleLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errBox   = document.getElementById('login-error');
  errBox.classList.add('hidden');

  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');

    localStorage.setItem('token', data.access_token);
    window.location.href = '/courses';
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.remove('hidden');
  }
}

// Function to handle registration
async function handleRegister() {
  const full_name       = document.getElementById('reg-name').value.trim();
  const email           = document.getElementById('reg-email').value.trim();
  const password        = document.getElementById('reg-password').value;
  const confirmPassword = document.getElementById('reg-password-confirm').value;
  const role            = document.getElementById('reg-role').value;
  
  const errBox = document.getElementById('register-error');
  const okBox  = document.getElementById('register-success');
  
  errBox.classList.add('hidden');
  okBox.classList.add('hidden');

  if (password !== confirmPassword) {
    errBox.textContent = 'Passwords do not match.';
    errBox.classList.remove('hidden');
    return;
  }

  try {
    const res  = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, full_name, role }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Registration failed');

    // Show success message with warning about future authorization requirement
    okBox.textContent = 'Account created! Please log in.\nWARNING: In future updates, account registration, regardless of role, will require approval from a user with the "Instructor" role.';
    okBox.classList.remove('hidden');
    
    // After a short delay, switch back to the login tab so they can log in with their new account
    setTimeout(() => switchTab('login'), 3500); 
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.remove('hidden');
  }
}
</script>
{% endblock %}
