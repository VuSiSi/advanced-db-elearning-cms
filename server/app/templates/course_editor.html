{% extends "base.html" %}
{% block title %}Course Editor — E-Learning CMS{% endblock %}

{% block content %}
<div class="editor-layout">

  <!-- — LEFT: Course tree sidebar — -->
  <aside class="editor-sidebar">
    <div class="sidebar-header">
      <h2 class="sidebar-title" id="course-title">Loading...</h2>
      <button class="btn btn-sm" id="btn-add-chapter" type="button">+ Chapter</button>
    </div>

    <div class="tree-container" id="course-tree">
      <div class="loading">Loading structure...</div>
    </div>
  </aside>

  <!-- — RIGHT: Lesson content panel — -->
  <section class="editor-content">
    <div id="content-panel">
      <div class="empty-state">
        <p>Select a lesson from the left to view or edit its content.</p>
      </div>
    </div>
  </section>

</div>
{% endblock %}

{% block scripts %}
<script>
// ================= STATE =================
let currentLesson = null;
let lessonIndex = {};

// ================= MOCK DATA =================
const MOCK_COURSE = {
  id: 'mock-001',
  title: 'Introduction to Python',
  chapters: [
    {
      chapter_id: 'ch-1',
      title: 'Getting Started',
      order: 1,
      lessons: [
        { lesson_id: 'ls-1', title: 'What is Python?', type: 'video', order: 1 },
        { lesson_id: 'ls-2', title: 'Chapter 1 Quiz',  type: 'quiz',  order: 2 },
      ]
    },
    {
      chapter_id: 'ch-2',
      title: 'Variables & Types',
      order: 2,
      lessons: [
        { lesson_id: 'ls-3', title: 'Variables', type: 'document', order: 1 },
        { lesson_id: 'ls-4', title: 'Data Types', type: 'video',   order: 2 },
      ]
    }
  ]
};

const LESSON_TYPE_ICON = { video: '▶', quiz: '?', document: '≡' };

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function buildLessonIndex(course) {
  const index = {};
  for (const chapter of course.chapters || []) {
    for (const lesson of chapter.lessons || []) {
      index[lesson.lesson_id] = { ...lesson };
    }
  }
  return index;
}

function renderTree(course) {
  lessonIndex = buildLessonIndex(course);
  document.getElementById('course-title').textContent = course.title;
  const tree = document.getElementById('course-tree');

  tree.innerHTML = (course.chapters || []).map(ch => `
    <div class="tree-chapter" id="ch-${escapeHtml(ch.chapter_id)}">
      <div class="tree-chapter-header" data-action="toggle-chapter">
        <span class="tree-chevron" aria-hidden="true">▾</span>
        <span class="tree-chapter-title">${escapeHtml(ch.title)}</span>
      </div>
      <div class="tree-lessons">
        ${(ch.lessons || []).map(ls => `
          <div class="tree-lesson" data-action="select-lesson" data-lesson-id="${escapeHtml(ls.lesson_id)}">
            <span class="lesson-icon" aria-hidden="true">${LESSON_TYPE_ICON[ls.type] || '•'}</span>
            <span class="lesson-title">${escapeHtml(ls.title)}</span>
          </div>
        `).join('')}
        <div class="tree-add-lesson" role="button" tabindex="0" data-action="add-lesson" data-chapter-id="${escapeHtml(ch.chapter_id)}">
          + Add lesson
        </div>
      </div>
    </div>
  `).join('');
}

// ================= SELECT LESSON =================
function selectLesson(lessonId, clickedEl) {
  const meta = lessonIndex[lessonId];
  if (!meta) return;

  document.querySelectorAll('.tree-lesson').forEach(e => e.classList.remove('active'));
  if (clickedEl) clickedEl.classList.add('active');

  currentLesson = { lessonId, type: meta.type, title: meta.title };

  const panel = document.getElementById('content-panel');
  if (meta.type === 'video') {
    panel.innerHTML = `
      <div class="content-header"><h3>${escapeHtml(meta.title)}</h3><span class="badge badge-video">Video</span></div>
      <div class="form-group"><label>Video URL</label><input type="text" placeholder="https://..." /></div>
      <div class="form-group"><label>Duration (seconds)</label><input type="number" placeholder="300" /></div>
      <button class="btn btn-primary" type="button" data-action="save-lesson">Save</button>
    `;
  } else if (meta.type === 'quiz') {
    panel.innerHTML = `
      <div class="content-header"><h3>${escapeHtml(meta.title)}</h3><span class="badge badge-quiz">Quiz</span></div>
      <p class="muted">Quiz editor — Day 4 (Quyen)</p>
    `;
  } else {
    panel.innerHTML = `
      <div class="content-header"><h3>${escapeHtml(meta.title)}</h3><span class="badge badge-doc">Document</span></div>
      <div class="form-group"><label>Content</label><textarea rows="12" placeholder="Write content here..."></textarea></div>
      <button class="btn btn-primary" type="button" data-action="save-lesson">Save</button>
    `;
  }
}

// ================= SAVE =================
function saveLesson() {
  if (!currentLesson) return;
  alert('TODO Day 2: Save lesson ' + currentLesson.lessonId);
}

// ================= TREE TOGGLE =================
function toggleChapter(el) {
  const lessons = el.nextElementSibling;
  const icon = el.querySelector('.tree-chevron');
  if (!lessons || !icon) return;

  if (lessons.classList.contains('hidden')) {
    lessons.classList.remove('hidden');
    icon.textContent = '▾';
  } else {
    lessons.classList.add('hidden');
    icon.textContent = '▸';
  }
}

// ================= ADD =================
function addChapter() {
  const name = prompt('Chapter title:');
  if (!name) return;
  alert('TODO Day 2: POST /api/courses/:id/chapters — ' + name);
}

function addLesson(chapterId) {
  const name = prompt('Lesson title:');
  if (!name) return;
  alert('TODO Day 2: POST /api/courses/:id/chapters/:ch/lessons — ' + name);
}

function initCourseEditor() {
  const tree = document.getElementById('course-tree');
  if (!tree) return;

  tree.addEventListener('click', (e) => {
    const saveBtn = e.target.closest('[data-action="save-lesson"]');
    if (saveBtn) {
      saveLesson();
      return;
    }

    const lessonEl = e.target.closest('.tree-lesson');
    if (lessonEl && tree.contains(lessonEl)) {
      selectLesson(lessonEl.dataset.lessonId, lessonEl);
      return;
    }

    const headerEl = e.target.closest('.tree-chapter-header');
    if (headerEl && tree.contains(headerEl)) {
      toggleChapter(headerEl);
      return;
    }

    const addLessonEl = e.target.closest('.tree-add-lesson');
    if (addLessonEl && tree.contains(addLessonEl)) {
      addLesson(addLessonEl.dataset.chapterId);
    }
  });

  tree.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const addLessonEl = e.target.closest('.tree-add-lesson');
    if (addLessonEl && tree.contains(addLessonEl)) {
      e.preventDefault();
      addLesson(addLessonEl.dataset.chapterId);
    }
  });

  const btnAddChapter = document.getElementById('btn-add-chapter');
  if (btnAddChapter) btnAddChapter.addEventListener('click', addChapter);

  // Load mock data on Day 1, switch to real API on Day 2
  renderTree(MOCK_COURSE);
}

initCourseEditor();
</script>
{% endblock %}
