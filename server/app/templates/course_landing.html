{% extends "base.html" %}
{% block title %}{{ course.title if course else "Course" }} — E-Learning CMS{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
  <div style="text-align:center;">
    <div class="loading" style="justify-content:center;font-size:15px;">
      Loading course...
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const COURSE_ID = "{{ course.id if course else '' }}";
const CHAPTERS = {{ course.chapters | default([]) | tojson | safe }};
// Used to check ownership so non-owner instructors can preview as student
const COURSE_INSTRUCTOR_ID = "{{ course.instructor_id if course else '' }}";

(function routeByRole() {
  const token = localStorage.getItem('token');

  if (!token) {
    window.location.href = '/login';
    return;
  }

  let role   = null;
  let userId = null;
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    role   = payload.role;
    userId = payload.sub;
  } catch {
    window.location.href = '/login';
    return;
  }

  // Owner instructor → editor; non-owner instructor → preview (student view)
  if (role === 'instructor' && userId === COURSE_INSTRUCTOR_ID) {
    window.location.href = `/courses/${COURSE_ID}/edit`;
    return;
  }

  // Students OR non-owner instructors: navigate to the first lesson
  for (const ch of CHAPTERS) {
    if (ch.lessons && ch.lessons.length > 0) {
      const firstLesson = ch.lessons[0];
      window.location.href = `/courses/${COURSE_ID}/lessons/${firstLesson.lesson_id}`;
      return;
    }
  }

  // No lessons yet
  document.querySelector('.loading').textContent = 'This course has no lessons yet.';
})();
</script>
{% endblock %}
