{% extends "base.html" %}
{% block title %}Login - E-Learning CMS{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-tabs" role="tablist" aria-label="Authentication">
      <button class="auth-tab active" id="tab-login" type="button" role="tab" aria-selected="true" aria-controls="form-login">Login</button>
      <button class="auth-tab" id="tab-register" type="button" role="tab" aria-selected="false" aria-controls="form-register">Register</button>
    </div>

    <!-- LOGIN -->
    <form id="form-login" class="auth-form" novalidate>
      <h2 class="auth-title">Welcome back</h2>
      <div id="login-error" class="alert alert-error hidden" aria-live="polite"></div>

      <div class="form-group">
        <input type="email" id="login-email" placeholder="Email Address" autocomplete="email" required />
      </div>

      <div class="form-group">
        <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required />
      </div>

      <div class="form-group">
        <label for="login-captcha-answer">Captcha: <span id="login-captcha-question">Loading...</span></label>
        <input type="text" id="login-captcha-answer" placeholder="Enter captcha answer" autocomplete="off" required />
      </div>

      <button class="btn btn-primary btn-full" type="submit" id="btn-login">Sign in</button>
    </form>

    <!-- REGISTER -->
    <form id="form-register" class="auth-form hidden" novalidate>
      <h2 class="auth-title">Create account</h2>

      <div id="register-error" class="alert alert-error hidden" aria-live="polite"></div>
      <div id="register-success" class="alert alert-success hidden" aria-live="polite"></div>

      <div class="form-group">
        <input type="text" id="reg-name" placeholder="Full Name" autocomplete="name" required />
      </div>

      <div class="form-group">
        <input type="email" id="reg-email" placeholder="Email Address" autocomplete="email" required />
      </div>

      <div class="form-group">
        <input type="password" id="reg-password" placeholder="Password" autocomplete="new-password" required />
      </div>

      <div class="form-group">
        <label for="reg-role">Choose your role</label>
        <select id="reg-role">
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
        </select>
      </div>

      <div class="form-group">
        <label for="register-captcha-answer">Captcha: <span id="register-captcha-question">Loading...</span></label>
        <input type="text" id="register-captcha-answer" placeholder="Enter captcha answer" autocomplete="off" required />
      </div>

      <button class="btn btn-primary btn-full" type="submit" id="btn-register">Create account</button>
    </form>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ===== TAB SWITCH =====
const tabLogin = document.getElementById('tab-login');
const tabRegister = document.getElementById('tab-register');
const formLogin = document.getElementById('form-login');
const formRegister = document.getElementById('form-register');

const captchaState = {
  login: { token: '', question: '' },
  register: { token: '', question: '' },
};

tabLogin.addEventListener('click', () => switchTab('login'));
tabRegister.addEventListener('click', () => switchTab('register'));

function switchTab(tab) {
  const isLogin = tab === 'login';
  formLogin.classList.toggle('hidden', !isLogin);
  formRegister.classList.toggle('hidden', isLogin);
  tabLogin.classList.toggle('active', isLogin);
  tabRegister.classList.toggle('active', !isLogin);
  tabLogin.setAttribute('aria-selected', String(isLogin));
  tabRegister.setAttribute('aria-selected', String(!isLogin));
  loadCaptcha(tab);
}

// ===== HELPERS =====
function showError(boxId, rawMessage) {
  const box = document.getElementById(boxId);
  if (!box) return;
  const clean = rawMessage.replace(/\s*\(\d{3}[^)]*\)\s*$/, '').trim();
  box.textContent = clean || rawMessage;
  box.classList.remove('hidden');
}

function hideError(boxId) {
  const box = document.getElementById(boxId);
  if (box) box.classList.add('hidden');
}

async function extractErrorMessage(res) {
  if (res.status === 401) {
    return 'Incorrect email or password. Please try again.';
  }
  if (res.status === 400) {
    try {
      const data = await res.json();
      return data.detail || 'Invalid request. Please check your inputs.';
    } catch {
      return 'Invalid request. Please check your inputs.';
    }
  }
  if (res.status === 429) {
    return 'Too many attempts. Please wait a moment and try again.';
  }
  if (res.status >= 500) {
    return 'Server error. Please try again later.';
  }
  try {
    const data = await res.json();
    return data.detail || 'Something went wrong. Please try again.';
  } catch {
    return 'Something went wrong. Please try again.';
  }
}

async function loadCaptcha(formName) {
  const questionEl = document.getElementById(`${formName}-captcha-question`);
  const answerEl = document.getElementById(`${formName}-captcha-answer`);

  if (questionEl) questionEl.textContent = 'Loading...';
  if (answerEl) answerEl.value = '';

  try {
    const res = await fetch('/api/auth/captcha');
    if (!res.ok) throw new Error('Captcha failed');

    const data = await res.json();
    captchaState[formName] = {
      token: data.captcha_token,
      question: data.question,
    };

    if (questionEl) questionEl.textContent = data.question;
  } catch {
    captchaState[formName] = { token: '', question: '' };
    if (questionEl) questionEl.textContent = 'Cannot load captcha';
  }
}

function getCaptchaPayload(formName) {
  const answerEl = document.getElementById(`${formName}-captcha-answer`);
  return {
    captcha_token: captchaState[formName].token,
    captcha_answer: answerEl ? answerEl.value.trim() : '',
  };
}

// ===== LOGIN =====
formLogin.addEventListener('submit', async (e) => {
  e.preventDefault();
  await handleLogin();
});

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const captcha = getCaptchaPayload('login');
  const btnEl = document.getElementById('btn-login');

  hideError('login-error');

  if (!email || !password) {
    showError('login-error', 'Please enter your email and password.');
    return;
  }
  if (!email.includes('@')) {
    showError('login-error', 'Please enter a valid email address.');
    return;
  }
  if (!captcha.captcha_answer) {
    showError('login-error', 'Please enter the captcha answer.');
    return;
  }

  btnEl.disabled = true;
  btnEl.textContent = 'Signing in...';

  try {
    let res;
    try {
      res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, ...captcha }),
      });
    } catch (fetchErr) {
      if (fetchErr instanceof TypeError) {
        showError('login-error', 'Cannot connect to the server. Please check your connection.');
      } else {
        showError('login-error', 'Incorrect email or password. Please try again.');
      }
      await loadCaptcha('login');
      return;
    }

    if (!res.ok) {
      const msg = await extractErrorMessage(res);
      showError('login-error', msg);
      await loadCaptcha('login');
      return;
    }

    const data = await res.json();
    localStorage.setItem('token', data.access_token);
    window.location.href = '/courses';
  } finally {
    btnEl.disabled = false;
    btnEl.textContent = 'Sign in';
  }
}

// ===== REGISTER =====
formRegister.addEventListener('submit', async (e) => {
  e.preventDefault();
  await handleRegister();
});

async function handleRegister() {
  const full_name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const role = document.getElementById('reg-role').value;
  const captcha = getCaptchaPayload('register');
  const btnEl = document.getElementById('btn-register');
  const okBox = document.getElementById('register-success');

  hideError('register-error');
  okBox.classList.add('hidden');

  if (!full_name) {
    showError('register-error', 'Please enter your full name.');
    return;
  }
  if (!email || !email.includes('@')) {
    showError('register-error', 'Please enter a valid email address.');
    return;
  }
  if (!password) {
    showError('register-error', 'Please enter a password.');
    return;
  }
  if (password.length < 6) {
    showError('register-error', 'Password must be at least 6 characters long.');
    return;
  }
  if (!captcha.captcha_answer) {
    showError('register-error', 'Please enter the captcha answer.');
    return;
  }

  btnEl.disabled = true;
  btnEl.textContent = 'Creating account...';

  try {
    let res;
    try {
      res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, full_name, role, ...captcha }),
      });
    } catch (fetchErr) {
      if (fetchErr instanceof TypeError) {
        showError('register-error', 'Cannot connect to the server. Please check your connection.');
      } else {
        showError('register-error', 'Something went wrong. Please try again.');
      }
      await loadCaptcha('register');
      return;
    }

    if (!res.ok) {
      const msg = await extractErrorMessage(res);
      if (msg.toLowerCase().includes('already registered') || msg.toLowerCase().includes('already')) {
        showError('register-error', 'This email is already registered. Please log in instead.');
      } else {
        showError('register-error', msg);
      }
      await loadCaptcha('register');
      return;
    }

    okBox.textContent = 'Account created successfully! Redirecting to login...';
    okBox.classList.remove('hidden');
    await loadCaptcha('register');
    await loadCaptcha('login');
    setTimeout(() => switchTab('login'), 1500);
  } finally {
    btnEl.disabled = false;
    btnEl.textContent = 'Create account';
  }
}

loadCaptcha('login');
loadCaptcha('register');
</script>
{% endblock %}
