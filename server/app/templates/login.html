{% extends "base.html" %}
{% block title %}Login — E-Learning CMS{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-tabs" role="tablist" aria-label="Authentication">
      <button class="auth-tab active" id="tab-login" type="button" role="tab" aria-selected="true" aria-controls="form-login">Login</button>
      <button class="auth-tab" id="tab-register" type="button" role="tab" aria-selected="false" aria-controls="form-register">Register</button>
    </div>

    <!-- LOGIN -->
    <form id="form-login" class="auth-form" novalidate>
      <h2 class="auth-title">Welcome back</h2>
      <div id="login-error" class="alert alert-error hidden" aria-live="polite"></div>

      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <button class="btn btn-primary btn-full" type="submit" id="btn-login">Sign in</button>
    </form>

    <!-- REGISTER -->
    <form id="form-register" class="auth-form hidden" novalidate>
      <h2 class="auth-title">Create account</h2>

      <div id="register-error" class="alert alert-error hidden" aria-live="polite"></div>
      <div id="register-success" class="alert alert-success hidden" aria-live="polite"></div>

      <div class="form-group">
        <label for="reg-name">Full name</label>
        <input type="text" id="reg-name" placeholder="Jane Doe" autocomplete="name" required />
      </div>

      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password" required />
      </div>

      <div class="form-group">
        <label for="reg-role">I am a...</label>
        <select id="reg-role">
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
        </select>
      </div>

      <button class="btn btn-primary btn-full" type="submit" id="btn-register">Create account</button>
    </form>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ===== TAB SWITCH =====
const tabLogin = document.getElementById('tab-login');
const tabRegister = document.getElementById('tab-register');
const formLogin = document.getElementById('form-login');
const formRegister = document.getElementById('form-register');

tabLogin.addEventListener('click', () => switchTab('login'));
tabRegister.addEventListener('click', () => switchTab('register'));

function switchTab(tab) {
  const isLogin = tab === 'login';

  formLogin.classList.toggle('hidden', !isLogin);
  formRegister.classList.toggle('hidden', isLogin);

  tabLogin.classList.toggle('active', isLogin);
  tabRegister.classList.toggle('active', !isLogin);

  tabLogin.setAttribute('aria-selected', String(isLogin));
  tabRegister.setAttribute('aria-selected', String(!isLogin));
}

// ===== LOGIN =====
formLogin.addEventListener('submit', async (e) => {
  e.preventDefault();
  await handleLogin();
});

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errBox = document.getElementById('login-error');

  errBox.classList.add('hidden');

  if (!email || !password) {
    errBox.textContent = 'Please enter email and password';
    errBox.classList.remove('hidden');
    return;
  }

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');

    localStorage.setItem('token', data.access_token);
    window.location.href = '/courses';
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.remove('hidden');
  }
}

// ===== REGISTER =====
formRegister.addEventListener('submit', async (e) => {
  e.preventDefault();
  await handleRegister();
});

async function handleRegister() {
  const full_name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const role = document.getElementById('reg-role').value;

  const errBox = document.getElementById('register-error');
  const okBox = document.getElementById('register-success');

  errBox.classList.add('hidden');
  okBox.classList.add('hidden');

  if (!email || !password || !full_name) {
    errBox.textContent = 'Please fill all fields';
    errBox.classList.remove('hidden');
    return;
  }

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, full_name, role }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Registration failed');

    okBox.textContent = 'Account created! Please log in.';
    okBox.classList.remove('hidden');

    setTimeout(() => switchTab('login'), 1500);
  } catch (err) {
    errBox.textContent = err.message;
    errBox.classList.remove('hidden');
  }
}
</script>
{% endblock %}
