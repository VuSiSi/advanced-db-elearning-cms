{% extends "base.html" %}
{% block title %}Analytics — EduCMS{% endblock %}

{% block content %}
<div class="page-wrapper">
  <div class="page-header">
    <div>
      <h1 class="page-title">Analytics</h1>
      <p class="page-subtitle">Course completion rates and quiz performance.</p>
    </div>
    <select id="course-select" style="max-width:280px;">
      <option value="">Select a course...</option>
    </select>
  </div>

  <div id="stats-content">
    <div class="empty-state-page">
      <div class="empty-state-icon">📊</div>
      <h2 class="empty-state-title">Select a course</h2>
      <p class="empty-state-desc">Choose a course above to view its analytics and student performance data.</p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadCourseList() {
  const select = document.getElementById('course-select');
  try {
    const res = await fetch('/api/courses/');
    const courses = await res.json();
    courses.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.title;
      select.appendChild(opt);
    });
  } catch {}
}

document.getElementById('course-select').addEventListener('change', async e => {
  const courseId = e.target.value;
  if (!courseId) return;
  await loadStats(courseId);
});

async function loadStats(courseId) {
  const content = document.getElementById('stats-content');
  content.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);">Loading analytics...</div>';

  try {
    const res = await fetch(`/api/stats/course/${courseId}`, { headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Failed');

    const completionRate = data.total_students > 0
      ? Math.round((data.fully_completed_count / data.total_students) * 100)
      : 0;

    content.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Students</div>
          <div class="stat-value">${data.total_students}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Completion</div>
          <div class="stat-value">${data.avg_completion_pct}%</div>
          <div class="progress-bar" style="margin-top:8px;"><div class="progress-fill" style="width:${data.avg_completion_pct}%"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Quiz Score</div>
          <div class="stat-value">${data.avg_quiz_score !== null ? data.avg_quiz_score + '%' : 'N/A'}</div>
          ${data.avg_quiz_score !== null ? `<div style="font-size:11px;color:var(--text-muted);margin-top:3px;">Noise values (e.g. "V") auto-filtered</div>` : ''}
        </div>
      </div>

      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;">
        <div style="padding:16px 18px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;">
          Per-Lesson Completion
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>Lesson</th>
              <th>Type</th>
              <th>Completions</th>
              <th>Rate</th>
            </tr>
          </thead>
          <tbody>
            ${data.per_lesson_stats.map(ls => {
              const rate = data.total_students > 0 ? Math.round((ls.completed_count / data.total_students) * 100) : 0;
              const badgeClass = ls.type === 'video' ? 'badge-video' : ls.type === 'quiz' ? 'badge-quiz' : 'badge-doc';
              return `
                <tr>
                  <td>${ls.title}</td>
                  <td><span class="badge ${badgeClass}">${ls.type}</span></td>
                  <td>${ls.completed_count}</td>
                  <td>
                    <div style="display:flex;align-items:center;gap:8px;">
                      <div class="progress-bar" style="flex:1;max-width:120px;">
                        <div class="progress-fill" style="width:${rate}%"></div>
                      </div>
                      <span style="font-size:12px;color:var(--text-muted);min-width:32px;">${rate}%</span>
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (err) {
    content.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
  }
}

loadCourseList();
</script>
{% endblock %}
